baseURL = "https://blog.aukovien.com/"
languageCode = "en-us"
title = "Aukovien // Writing"
theme = "PaperMod"
paginate = 10
summaryLength = 20

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  author = "Anar Enkhzol"
  description = "Writing on security, reverse engineering, and tooling."
  keywords = ["security", "ctf", "reverse engineering", "osint"]
  DateFormat = "Jan 2006"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  hidemeta = false
  hideSummary = false
  comments = false

  [params.homeInfoParams]
    Title = "writing"
    Content = "notes on security, reverse engineering, and building things."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/aukovien"

  [[params.socialIcons]]
    name = "hackthebox"
    url = "https://app.hackthebox.com/public/users/1459139"

[menu]
  [[menu.main]]
    identifier = "back"
    name = "aukovien.com"
    url = "https://aukovien.com"
    weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
